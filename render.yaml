services:
  - type: web
    name: inventory-management-api
    runtime: docker
    plan: starter
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: /bin/sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}'
    preDeployCommand: alembic upgrade head
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: APP_NAME
        value: Inventory & Order Management API
      - key: APP_ENV
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-management-db
          property: connectionString
      - key: DB_POOL_SIZE
        value: 5
      - key: DB_MAX_OVERFLOW
        value: 10
      - key: DB_POOL_TIMEOUT
        value: 30
      - key: DASHBOARD_LOW_STOCK_THRESHOLD
        value: 5
      - key: BACKEND_CORS_ORIGINS
        sync: false

databases:
  - name: inventory-management-db
    postgresMajorVersion: "16"
    region: oregon
    plan: basic-256mb
    databaseName: inventory_db
    user: inventory_user
    ipAllowList: []
